workflows:
  ios-sideloadly:
    name: iOS Unsigned IPA (за Sideloadly)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      - name: Build iOS (без подписване)
        script: |
          flutter build ios \
            --release \
            --no-codesign

      - name: Пакетирай .app → .ipa
        script: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r BulgarianAutoRadio.ipa Payload
          echo "IPA size: $(du -sh BulgarianAutoRadio.ipa)"

    artifacts:
      - build/ios/ipa/BulgarianAutoRadio.ipa

  ios-release:
    name: iOS Release (App Store — платен акаунт)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
        - certificate_credentials
      vars:
        BUNDLE_ID: "com.bgautoradio.ios"

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_KEY_ID
        key_id: $APP_STORE_CONNECT_API_KEY_KEY_ID
        issuer_id: $APP_STORE_CONNECT_API_KEY_ISSUER_ID
        submit_to_testflight: true
