workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials    # APP_STORE_CONNECT_API_KEY_KEY_ID, ISSUER_ID, KEY
        - certificate_credentials  # CERTIFICATE_PRIVATE_KEY, CERTIFICATE_PASSWORD
      vars:
        BUNDLE_ID: "com.bgautoradio.ios"
        APP_STORE_APPLE_ID: "XXXXXXXXXX"  # replace with your Apple App ID

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true

    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files \
            $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_API_KEY_KEY_ID
        key_id: $APP_STORE_CONNECT_API_KEY_KEY_ID
        issuer_id: $APP_STORE_CONNECT_API_KEY_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - "External Testers"

  ios-debug:
    name: iOS Debug Build (no signing)
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - pull_request
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Flutter analyze
        script: flutter analyze --no-fatal-infos

      - name: Run tests
        script: flutter test

      - name: Build iOS (no codesign)
        script: |
          flutter build ios \
            --debug \
            --no-codesign

    artifacts:
      - build/ios/iphoneos/Runner.app
